<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Dashboard - Drone Camp</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        color: #fff;
        padding: 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #00eaff;
        font-size: 2.5em;
        text-shadow: 0 0 20px rgba(0, 234, 255, 0.5);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: rgba(0, 234, 255, 0.1);
        border: 2px solid #00eaff;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
      }

      .stat-card h3 {
        color: #00eaff;
        margin-bottom: 10px;
        font-size: 0.9em;
        text-transform: uppercase;
      }

      .stat-card .number {
        font-size: 2.5em;
        font-weight: bold;
        color: #fff;
      }

      .table-container {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        overflow: hidden;
        border: 2px solid rgba(0, 234, 255, 0.2);
        margin-bottom: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: rgba(0, 234, 255, 0.2);
        color: #00eaff;
        padding: 15px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid #00eaff;
        font-size: 0.9em;
      }

      td {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(0, 234, 255, 0.1);
      }

      tr:hover {
        background: rgba(0, 234, 255, 0.05);
      }

      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      button {
        background: linear-gradient(135deg, #00eaff 0%, #00d4ff 100%);
        color: #000;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1em;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(0, 234, 255, 0.4);
      }

      .loading {
        text-align: center;
        padding: 40px;
        font-size: 1.2em;
        color: #00eaff;
      }

      .error {
        background: rgba(255, 0, 0, 0.1);
        border: 2px solid #ff0000;
        color: #ff6b6b;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .home-link {
        text-align: center;
        margin-top: 20px;
      }

      a {
        color: #00eaff;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.5em;
        }

        table {
          font-size: 0.9em;
        }

        th,
        td {
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>✈️ Registration Dashboard</h1>

      <div class="btn-group">
        <button onclick="loadData()">🔄 Refresh Data</button>
        <button onclick="downloadCSV()">📥 Download as CSV</button>
        <button onclick="window.location.href = 'registration.html'">
          📝 Back to Registration
        </button>
      </div>

      <div id="loading" class="loading" style="display: none">
        Loading data... ⏳
      </div>

      <div id="error" class="error" style="display: none"></div>

      <div class="stats">
        <div class="stat-card">
          <h3>Total Registrations</h3>
          <div class="number" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <h3>Popular Batch</h3>
          <div class="number" id="popularBatch">-</div>
        </div>
        <div class="stat-card">
          <h3>Age Range</h3>
          <div class="number" id="ageRange">-</div>
        </div>
      </div>

      <div class="table-container">
        <table id="dataTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Age</th>
              <th>Guardian</th>
              <th>Batch</th>
              <th>School</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="9" style="text-align: center; padding: 40px">
                No data available. Click "Refresh Data" to load.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="home-link">
        <p>Questions? Contact: <strong>shivampan707@gmail.com</strong></p>
      </div>
    </div>

    <script>
      // Replace with your Google Sheet ID
      const SHEET_ID = "19okXL3SKm2-gCBe8HiLzfTNWEYookvL42NY4O_ANzBc";
      const SHEET_NAME = "Form Responses 1";
      const API_KEY = "AIzaSyCtE8YXXX"; // Add your Google API key if you have one

      // Fallback: Use CSV export URL (works without API key)
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

      function loadData() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("error").style.display = "none";

        // Using CORS-friendly CSV export
        fetch(CSV_URL)
          .then((response) => response.text())
          .then((data) => {
            parseAndDisplayData(data);
            document.getElementById("loading").style.display = "none";
          })
          .catch((error) => {
            console.error("Error loading data:", error);
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error").innerHTML = `
            <strong>⚠️ Could not load data automatically.</strong><br>
            <p>Visit your Google Sheet directly:</p>
            <a href="https://docs.google.com/spreadsheets/d/19okXL3SKm2-gCBe8HiLzfTNWEYookvL42NY4O_ANzBc/" target="_blank" style="font-size: 1.1em;">
              📊 Open Google Spreadsheet
            </a>
          `;
          });
      }

      function parseAndDisplayData(csvData) {
        const rows = csvData.trim().split("\n");
        if (rows.length < 2) {
          document.getElementById("tableBody").innerHTML =
            '<tr><td colspan="9" style="text-align: center; padding: 20px;">No data found</td></tr>';
          return;
        }

        // Skip header row
        const dataRows = rows.slice(1);
        let tableHTML = "";
        let batchCount = {};
        let ages = [];

        dataRows.forEach((row, index) => {
          if (row.trim() === "") return;

          const cells = parseCSVRow(row);
          if (cells.length < 7) return;

          const [
            timestamp,
            fullName,
            email,
            phone,
            age,
            batch,
            guardian,
            school,
          ] = cells;

          tableHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${fullName}</td>
            <td>${email}</td>
            <td>${phone}</td>
            <td>${age}</td>
            <td>${guardian}</td>
            <td>${batch}</td>
            <td>${school}</td>
            <td>${timestamp.split(" ")[0]}</td>
          </tr>
        `;

          // Collect stats
          batchCount[batch] = (batchCount[batch] || 0) + 1;
          ages.push(parseInt(age) || 0);
        });

        if (tableHTML === "") {
          document.getElementById("tableBody").innerHTML =
            '<tr><td colspan="9" style="text-align: center; padding: 20px;">No data found</td></tr>';
          return;
        }

        document.getElementById("tableBody").innerHTML = tableHTML;

        // Update stats
        document.getElementById("totalCount").textContent = dataRows.length;

        // Popular batch
        const popularBatch = Object.keys(batchCount).sort(
          (a, b) => batchCount[b] - batchCount[a],
        )[0];
        document.getElementById("popularBatch").textContent =
          popularBatch || "N/A";

        // Age range
        if (ages.length > 0) {
          const minAge = Math.min(...ages);
          const maxAge = Math.max(...ages);
          document.getElementById("ageRange").textContent =
            `${minAge}-${maxAge}`;
        }
      }

      function parseCSVRow(row) {
        const result = [];
        let current = "";
        let insideQuotes = false;

        for (let i = 0; i < row.length; i++) {
          const char = row[i];

          if (char === '"' && (i === 0 || row[i - 1] !== "\\")) {
            insideQuotes = !insideQuotes;
          } else if (char === "," && !insideQuotes) {
            result.push(current.trim());
            current = "";
          } else {
            current += char;
          }
        }
        result.push(current.trim());
        return result;
      }

      function downloadCSV() {
        fetch(CSV_URL)
          .then((response) => response.text())
          .then((data) => {
            const element = document.createElement("a");
            element.setAttribute(
              "href",
              "data:text/csv;charset=utf-8," + encodeURIComponent(data),
            );
            element.setAttribute(
              "download",
              "registrations_" + new Date().getTime() + ".csv",
            );
            element.style.display = "none";
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            alert("✅ CSV file downloaded!");
          });
      }

      // Load data when page opens
      window.addEventListener("load", loadData);
    </script>
  </body>
</html>
